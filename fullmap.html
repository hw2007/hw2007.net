<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title>hw2007 | Server Map</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body style="overflow: hidden">
		<!-- Title -->
		<p class="small" style="text-align: center;">
			<b>Server Map</b>
		</p>

		<!-- Embedded map site -->
		<div
			style="
			position: absolute;
			top: 0px;
			bottom: 0px;
			left: 0px;
			width: 100%;
			height: 100%">
			<iframe
				src="/map/"
				style="
				border: none; 
				outline: none; 
				width: 100%; 
				height: 100%">
			</iframe>
		</div>

		<p style="
			position: absolute;
			left: 0px;
			padding: 0px;
			bottom: -10px;
			margin-left: 5px;
			background-color: black;
			border-style: solid;
			border-width: 10px;
			border-color: black;
			border-radius: 10px;
		">
			<a class="small" href="map.html">
				<span class="large-view">Exit expanded view</span>
				<span class="small-view">Shrink</span>
			</a>
		</p>
	</body>
</html>
