<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="/styles/style.css" />
		<link rel="stylesheet" type="text/css" href="/styles/downloads.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title>Server Downloads - hw2007.net</title>
		<link rel="icon" href="/assets/favicon.png" type="image/x-icon" />
	</head>
	<body>
		<!-- Back button -->
		<p class="back">
			<a href="/"><< Back to hw2007.net</a>
		</p>

		<!-- Title area -->
		<p class="header">Server Downloads</p>
		<p></p>
		<p>
			<i>downloads of my minecraft server's world from various dates.</i>
		</p>
		<!-- Links -->
		<div
			style="
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
				max-width: var(--std-page-width);
				column-gap: calc(var(--pad2) - 8px);
				row-gap: 0px;
				justify-content: center;
				text-align: center;
				padding-bottom: var(--pad2);
				padding-top: calc(var(--pad3) - 5px);
				padding-left: var(--pad2);
				padding-right: var(--pad2);
				margin: auto;
			"
		>
			<div class="grid-item" id="2">
				<p><b>World 2 (JE)</b></p>
			</div>
			<div class="grid-item" id="1">
				<p><b>World 1 (BE)</b></p>
			</div>
		</div>

		<script src="/js/generate_download_links.js"></script>
	</body>
</html>
