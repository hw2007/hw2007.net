<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="style.css" />
		<link rel="stylesheet" type="text/css" href="styles/arcade.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title>hw2007 | Arcade</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body style="overflow: hidden">
		<!-- Back button -->
		<p class="back">
			<a href="/"><< Back to hw2007.net</a>
		</p>

		<!-- Title area -->
		<section style="text-align: center;">
		<p class="header">Arcade</p>
		<p><i id="motd">no quarters needed!</i></p>
		</section>

		<!-- Games -->
		<div id="game-container" style="
			display: grid;
			grid-template-columns: repeat(auto-fit, 200px);
			grid-auto-rows: 384px;
			gap: 40px;
			justify-content: center;
			text-align: center;
			padding-bottom: 40px;
			padding-top: 80px;
			padding-left: 10%;
			padding-right: 10%;
			margin: auto;
		">
			<!-- The game tiles are auto-generated by game-list.js -->
		</div>

		<!-- Load javascript files after body to ensure the site completes loading before js runs -->
		<script src="js/game-grid-generator.js"></script>
	</body>
</html>
