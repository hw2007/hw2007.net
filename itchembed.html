<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="styles/style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title id="title">Itch.io Embed - hw2007.net</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body style="overflow: hidden;">
		<!-- Embedded game -->
		<div id="game-container" style="
			position: absolute;
			top: -1px;
			bottom: -20px;
			left: -1px;
			width: calc(100% + 2px);
		">
			<iframe id="game-frame" allowtransparency="true" allowfullscreen style="
				border: none;
				outline: none;
				width: 100%;
				height: 100%;
			"></iframe>
	</div>

		<!-- Load javascript files after body to ensure the site completes loading before js runs -->
		<script src="js/itch-viewer.js"></script>
	</body>
</html>
