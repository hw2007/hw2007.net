<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<html>
	<head>
		<!-- THEMING SCRIPT -->
		<script src="js/sitewide-theme-manager.js" defer></script>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="styles/style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title id="title">Game - hw2007.net</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body style="overflow: hidden;">
		<!-- Back button -->
		<p class="back">
			<a id="back_button_link" href="/">
				<span id="back_button_text" class="large-view"><< Back to unknown</span>
				<span class="small-view"><< Back</span>
			</a>
		</p>

		<!-- Title -->
		<p style="margin-top: 19px;">
			<b id="name">Game</b>
		</p>

		<!-- Embedded game -->
		<div id="game-container"
			style="
			position: absolute;
			top: 60px;
			bottom: 8px;
			left: 0px;
			width: 100%;
        ">
			<iframe id="game" target="parent" allowtransparency="true" allowfullscreen style="
				border: none; 
				outline: none;
				width: calc(100% - 16px); 
				height: 100%;
				border-radius: 5px;
			">
			</iframe>
		</div>

		<!-- Fullscreen button -->
			<button class="image_button" id="expand" style="
				width: 27px; 
				height: 27px; 
				position: absolute;
				right: 16.5px;
				top: 16.5px;
				mask-image: url(assets/fullscreen.png);
			">
				<!--<img src="assets/fullscreen.png" style="
					width: 27px;
					height: 27px;
					position: relative;
				"></img>-->
			</button>

		<!-- Load javascript files after body to ensure the site completes loading before js runs -->
		<script src="js/game-viewer.js"></script>
	</body>
</html>
