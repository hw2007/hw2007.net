<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title id="title">hw2007 | Game</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body style="overflow: hidden;">
		<!-- Back button -->
		<p class="back">
			<a href="arcade.html">
				<span class="large-view"><< Back to arcade</span>
				<span class="small-view"><< Back</span>
			</a>
		</p>

		<!-- Title -->
		<p style="text-align: center;">
			<b id="name">Game</b>
		</p>

		<!-- Embedded game -->
		<div id="game-container"
			style="
			bottom: 0px;
			left: 0px;
			width: 100%; 
            height: 100vh;
        ">
			<iframe id="game" allowtransparency="true" allowfullscreen style="
				border: none; 
				outline: none;
				width: 100%;
				height: 100%;
			">
			</iframe>
		</div>

		<!-- Load javascript files after body to ensure the site completes loading before js runs -->
		<script src="js/game-viewer.js"></script>
        <script>
            function setHeight() {
                const gameContainer = document.getElementById("game-container");
                gameContainer.style.height = (window.innerHeight - 68) + "px";
            }

            window.addEventListener("resize", setHeight);
            window.addEventListener("load", setHeight);
        </script>
	</body>
</html>
