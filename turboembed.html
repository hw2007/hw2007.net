<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<html>
	<head>
		<!-- THEMING SCRIPT -->
		<script src="js/sitewide-theme-manager.js" defer></script>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="styles/style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title id="title">TurboWarp Embed - hw2007.net</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body id="game-container" style="
		overflow: hidden;
		margin: 0px;
		padding: 0px;
		width: 100%;
		height: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
	">
		<!-- Embedded game -->
		<div id="game-div" style="
			border: none;
			outline: none;
			position: absolute;
			top: calc(50% - 23px);
			transform: translateY(-50%);
		">
			<iframe id="game-frame" allowtransparency="true" allowfullscreen style="
				border: none;
				outline: none;
				width: 100%;
				height: 100%;
			"></iframe>
			<div style="
				position: absolute;
				top: -2px;
				width: 100%;
				height: 46px;
				background-color: var(--bg-color);
			"></div>
		</div>

		<!-- Load javascript files after body to ensure the site completes loading before js runs -->
		<script src="js/turbowarp-viewer.js"></script>
	</body>
</html>
