<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="styles/style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title id="title">hw2007 | TurboWarp Embed</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body id="game-container" style="
		overflow: hidden;
		margin: 0px;
		padding: 0px;
		width: 100%;
		height: 100%;
		display: flex;
		align-items: center;
		justify-content: center;
	">
		<!-- Embedded game -->
		<iframe id="game" allowtransparency="true" allowfullscreen style="
			border: none;
			outline: none;
			position: absolute;
			top: 50%;
			transform: translateY(-50%);
		">
		</iframe>

		<!-- Load javascript files after body to ensure the site completes loading before js runs -->
		<script src="js/turbowarp-viewer.js"></script>
	</body>
</html>
