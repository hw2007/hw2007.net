<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title>hw2007 | Server Map</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body style="overflow: hidden">
		<!-- Back button -->
		<p class="back">
			<a class="small" href="/">
				<span class="large-view"><< Back to hw2007.net</span>
				<span class="small-view"><< Back</span>
			</a>
		</p>

		<!-- Title -->
		<p class="small" style="text-align: center;">
			<b>Server Map</b>
		</p>

		<!-- Embedded map site -->
		<div id="map"
			style="
			bottom: 0px;
			left: 0px;
			width: 100%;
			height: calc(100%-1px);">
			<iframe
				src="/map/"
				style="
				border: none; 
				outline: none; 
				width: 100%; 
				height: 100%">
			</iframe>
		</div>

		<!-- Expand/shrink button -->
		<p style="
			position: absolute;
			left: 10px;
			bottom: -6px;
			border: solid;
			border-width: 8px;
			border-color: black;
			border-radius: 8px;
		">
			<button class="small" id="expand" style="width: 180px;">Enter expanded view</button>
			<button class="small" id="shrink" style="display: none; width: 180px;">Leave expanded view</button>
		</p>

		<!-- Load javascript files after body to ensure the site completes loading before js runs -->
		<script src="js/map-expand.js"></script>
	</body>
</html>
