<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="styles/style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title>hw2007 | Server Map</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
		<!-- Google icons -->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
	</head>
	<body style="overflow: hidden">
		<!-- Back button -->
		<p class="back">
			<a href="/">
				<span class="large-view"><< Back to hw2007.net</span>
				<span class="small-view"><< Back</span>
			</a>
		</p>

		<!-- Title -->
		<p style="text-align: center;">
			<b>Server Map</b>
		</p>

		<!-- Embedded map site -->
		<div
			id="container"
			style="
			position: absolute;
			top: 60px;
			transition: top 0.15s ease;
			bottom: 0px;
			left: 0px;
			width: 100%;
		">
			<iframe
				id="map"
				src="/map/"
				style="
				border: none; 
				outline: none; 
				width: 100%; 
				height: 100%;">
			</iframe>
		</div>

		<!-- Expand/shrink button -->
		<p style="
			position: absolute;
			left: 10px;
			bottom: -10px;
			border: solid;
			border-width: 8px;
			border-color: black;
			border-radius: 8px;
		">
			<button id="expand" style="width: 29px;"><span class="material-symbols-outlined">expand_content</span></button>
			<button id="shrink" style="display: none; width: 29px;"><span class="material-symbols-outlined">collapse_content</span></button>
		</p>

		<!-- Load javascript files after body to ensure the site completes loading before js runs -->
		<script src="js/map-expand.js"></script>
	</body>
</html>
