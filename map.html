<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title>hw2007 | Server Map</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body style="overflow: hidden">
		<!-- Back button -->
		<p class="back">
			<a class="small" href="/">
				<span class="large-view"><< Back to hw2007.net</span>
				<span class="small-view"><< Back</span>
			</a>
		</p>

		<!-- Expand button -->
		<p style="
			position: absolute;
			right: 0px;
			padding: 0px;
			top: 0px;
			padding-right: 15px;
		">
			<button class="small" id="expand" href="fullmap.html">
				<span class="large-view">Enter expanded view</span>
				<span class="small-view">Expand</span>
			</button>
		</p>

		<!-- Title -->
		<p class="small" style="text-align: center;">
			<b>Server Map</b>
		</p>

		<!-- Embedded map site -->
		<div id="map"
			style="
			position: absolute;
			top: 60px;
			bottom: 0px;
			left: 0px;
			width: 100%;
			height: calc(100%-1px);">
			<iframe
				src="/map/"
				style="
				border: none; 
				outline: none; 
				width: 100%; 
				height: 100%">
			</iframe>
		</div>

		<!-- Shrink button -->
		<p id="shrink-container" style="
			display: none;
			position: absolute;
			left: 50%;
            transform: translateX(-50%);
			bottom: -6px;
			border: solid;
			border-width: 8px;
			border-color: black;
			border-radius: 8px;
		">
			<button class="small" id="shrink">Exit expanded view</button>
		</p>

		<!-- Load javascript files after body to ensure the site completes loading before js runs -->
		<script src="js/map-expand.js"></script>
	</body>
</html>
