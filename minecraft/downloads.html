<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="/styles/style.css" />
		<link rel="stylesheet" type="text/css" href="/styles/downloads.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title>Server Downloads - hw2007.net</title>
		<link rel="icon" href="/assets/favicon.png" type="image/x-icon" />
	</head>
	<body>
		<!-- Back button -->
		<p class="back">
			<a href="/minecraft"><< Back to minecraft server</a>
		</p>

		<!-- Title area -->
		<p class="header">Server Downloads</p>
		<p></p>
		<p>
			<i>downloads of my minecraft server's world from various dates.</i>
		</p>
		<!-- Links -->
		<div class="grid" style="padding-top: var(--pad4); ">
			<a class="glowing fancy-link" id="latest-link">
				<img src="/assets/icons/swf_circle.png" style="width: 96px; height: 96px; margin-top: auto; margin-bottom: auto;">
				<p style="margin-top: 0px; margin-bottom: auto; padding-left: 8px;" id="latest-text">
					Placeholder text
				</p>
			</a>
		</div>
		<div class="grid" style="padding-bottom: var(--pad2);">
			<div class="grid-item" id="2">
				<p><b>World 2 Archives (JE)</b></p>
			</div>
			<div class="grid-item" id="1">
				<p><b>World 1 Archives (BE)</b></p>
			</div>
		</div>

		<script src="/js/generate_download_links.js"></script>

		<script>
			window.addEventListener('load', async () => {
				await window.loadDownloads();
				const script = document.createElement('script');
				script.src = '/js/sitewide-theme-manager.js';
				document.body.appendChild(script);
			});
		</script>
	</body>
</html>
