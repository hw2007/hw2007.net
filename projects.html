<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<html>
	<head>
		<!-- Use style.css as our default stylesheet -->
		<link rel="stylesheet" type="text/css" href="styles/style.css" />
		<!-- Set the page title to appear in the browser tab -->
		<title>Projects - hw2007.net</title>
		<link rel="icon" href="assets/favicon.png" type="image/x-icon" />
	</head>
	<body>
		<!-- Back button -->
		<p class="back">
			<a href="/"><< Back to hw2007.net</a>
		</p>

		<!-- Title area -->
		<p class="header">Projects<p>
		<p><i>things I have worked on, or am currently working on.</i></p>

		<!-- Links -->
		<!-- Links are filled out by generate_project_links.js -->
		<div id="container" style="
			display: grid;
			gap: var(--pad2);
			padding-top: var(--pad4);
			padding-bottom: calc(var(--pad2) + 4px);
			justify-self: center;
			padding-left: var(--pad2);
			padding-right: var(--pad2);
			width: calc(100% - var(--pad2) * 2);
			max-width: 800px;
			margin: auto;
		">
		</div>

		<script src="js/generate_project_links.js"></script>
	</body>
</html>
